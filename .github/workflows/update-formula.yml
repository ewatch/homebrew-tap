name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

env:
  FORMULA_PATH: Formula/snow-cli.rb
  TEMPLATE_PATH: Formula/snow-cli.rb.tpl
  MAIN_REPO: ewatch/snow-cli

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest release
        id: release
        shell: bash
        run: |
          api_url="https://api.github.com/repos/${MAIN_REPO}/releases/latest"
          response=$(curl -sS --fail "${api_url}")
          tag=$(echo "${response}" | jq -r '.tag_name')
          version="${tag#v}"

          if [[ -z "${tag}" || "${tag}" == "null" ]]; then
            echo "No releases found" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Read current formula version
        id: current
        shell: bash
        run: |
          current=$(grep -oP '(?<=version ")[^"]+' "${FORMULA_PATH}" 2>/dev/null || echo "none")
          echo "version=${current}" >> "${GITHUB_OUTPUT}"

      - name: Update if newer
        if: steps.release.outputs.version != steps.current.outputs.version || github.event_name != 'schedule'
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"

          targets=(
            "aarch64-apple-darwin"
            "x86_64-apple-darwin"
            "aarch64-unknown-linux-gnu"
            "x86_64-unknown-linux-gnu"
          )

          declare -A checksums
          for target in "${targets[@]}"; do
            archive="snow-cli-${version}-${target}.tar.xz"
            url="https://github.com/${MAIN_REPO}/releases/download/${tag}/${archive}"

            echo "Downloading ${archive}..."
            # --fail makes a missing asset (HTTP 4xx/5xx) a hard error instead of
            # silently saving the "Not Found" page and hashing it.
            if ! curl -fsSL -o "${archive}" "${url}"; then
              echo "ERROR: release asset not found: ${url}" >&2
              echo "The release must publish versioned archives named snow-cli-<version>-<target>.tar.xz for all four unix targets." >&2
              exit 1
            fi
            checksums["${target}"]=$(sha256sum "${archive}" | cut -d' ' -f1)
            rm -f "${archive}"
          done

          at_checksum="${checksums[aarch64-apple-darwin]}"
          intel_mac_checksum="${checksums[x86_64-apple-darwin]}"
          linux_arm_checksum="${checksums[aarch64-unknown-linux-gnu]}"
          linux_intel_checksum="${checksums[x86_64-unknown-linux-gnu]}"

          # Guard: every checksum must be present and the four must be distinct.
          # Identical hashes are the classic symptom of all downloads returning
          # the same error page, so refuse to publish a broken formula.
          for name in at_checksum intel_mac_checksum linux_arm_checksum linux_intel_checksum; do
            if [[ -z "${!name}" ]]; then
              echo "ERROR: empty checksum for ${name}" >&2
              exit 1
            fi
          done
          uniq_count=$(printf '%s\n' "${at_checksum}" "${intel_mac_checksum}" "${linux_arm_checksum}" "${linux_intel_checksum}" | sort -u | wc -l)
          if [[ "${uniq_count}" -lt 4 ]]; then
            echo "ERROR: per-target checksums are not all distinct; downloads likely returned error pages." >&2
            printf '  %s\n' "${at_checksum}" "${intel_mac_checksum}" "${linux_arm_checksum}" "${linux_intel_checksum}" >&2
            exit 1
          fi

          # Regenerate the formula from the committed template so every run
          # starts from clean placeholders.
          cp "${TEMPLATE_PATH}" "${FORMULA_PATH}"
          sed -i \
            -e "s|VERSION_PLACEHOLDER|${version}|g" \
            -e "s|ARM_MAC_PLACEHOLDER|${at_checksum}|g" \
            -e "s|INTEL_MAC_PLACEHOLDER|${intel_mac_checksum}|g" \
            -e "s|LINUX_ARM_PLACEHOLDER|${linux_arm_checksum}|g" \
            -e "s|LINUX_INTEL_PLACEHOLDER|${linux_intel_checksum}|g" \
            "${FORMULA_PATH}"

          echo "Updated formula to ${version}"

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "snow-cli bot"
          git config user.email "bot@ewatch.github"

          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update snow-cli to ${{ steps.release.outputs.version }}"
          git push
