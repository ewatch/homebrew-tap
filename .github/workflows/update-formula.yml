name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

env:
  FORMULA_PATH: Formula/snow-cli.rb
  MAIN_REPO: ewatch/snow-cli

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest release
        id: release
        shell: bash
        run: |
          api_url="https://api.github.com/repos/${MAIN_REPO}/releases/latest"
          response=$(curl -sS --fail "${api_url}")
          tag=$(echo "${response}" | jq -r '.tag_name')
          version="${tag#v}"

          if [[ -z "${tag}" || "${tag}" == "null" ]]; then
            echo "No releases found" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Read current formula version
        id: current
        shell: bash
        run: |
          current=$(grep -oP '(?<=version ")[^"]+' "${FORMULA_PATH}" 2>/dev/null || echo "none")
          echo "version=${current}" >> "${GITHUB_OUTPUT}"

      - name: Update if newer
        if: steps.release.outputs.version != steps.current.outputs.version || github.event_name != 'schedule'
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"

          declare -A targets
          targets[aarch64-apple-darwin]="aarch64-apple-darwin"
          targets[x86_64-apple-darwin]="x86_64-apple-darwin"
          targets[aarch64-unknown-linux-gnu]="aarch64-unknown-linux-gnu"
          targets[x86_64-unknown-linux-gnu]="x86_64-unknown-linux-gnu"
          targets[x86_64-pc-windows-msvc]="x86_64-pc-windows-msvc"

          declare -A checksums
          for target_key in "${!targets[@]}"; do
            target="${targets[$target_key]}"
            base_url="https://github.com/${MAIN_REPO}/releases/download/${tag}"

            if [[ "${target}" == "x86_64-pc-windows-msvc" ]]; then
              archive="snow-cli-${version}-${target}.zip"
            else
              archive="snow-cli-${version}-${target}.tar.xz"
            fi

            url="${base_url}/${archive}"

            echo "Downloading ${archive}..."
            curl -sSLO "${url}" || { echo "Failed to download ${archive}" >&2; exit 1; }

            if [[ "${archive}" == *.zip ]]; then
              checksums["${target}"]=$(sha256sum "${archive}" | cut -d' ' -f1)
            else
              checksums["${target}"]=$(sha256sum "${archive}" | cut -d' ' -f1)
            fi

            rm -f "${archive}"
          done

          at_checksum="${checksums[aarch64-apple-darwin]}"
          intel_mac_checksum="${checksums[x86_64-apple-darwin]}"
          linux_arm_checksum="${checksums[aarch64-unknown-linux-gnu]}"
          linux_intel_checksum="${checksums[x86_64-unknown-linux-gnu]}"
          win_checksum="${checksums[x86_64-pc-windows-msvc]}"

          cat > "${FORMULA_PATH}" << 'FORMULA'
class SnowCli < Formula
  desc "CLI gateway for LLMs and coding agents to access ServiceNow instances"
  homepage "https://github.com/ewatch/snow-cli"
  license "MIT"
  version "VERSION_PLACEHOLDER"

  on_macos do
    if Hardware::CPU.arm?
      url "https://github.com/ewatch/snow-cli/releases/download/vVERSION_PLACEHOLDER/snow-cli-VERSION_PLACEHOLDER-aarch64-apple-darwin.tar.xz"
      sha256 "ARM_MAC_PLACEHOLDER"
    end
    if Hardware::CPU.intel?
      url "https://github.com/ewatch/snow-cli/releases/download/vVERSION_PLACEHOLDER/snow-cli-VERSION_PLACEHOLDER-x86_64-apple-darwin.tar.xz"
      sha256 "INTEL_MAC_PLACEHOLDER"
    end
  end

  on_linux do
    if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
      url "https://github.com/ewatch/snow-cli/releases/download/vVERSION_PLACEHOLDER/snow-cli-VERSION_PLACEHOLDER-aarch64-unknown-linux-gnu.tar.xz"
      sha256 "LINUX_ARM_PLACEHOLDER"
    end
    if Hardware::CPU.intel?
      url "https://github.com/ewatch/snow-cli/releases/download/vVERSION_PLACEHOLDER/snow-cli-VERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.xz"
      sha256 "LINUX_INTEL_PLACEHOLDER"
    end
  end

  def install
    bin.install "snow-cli"
    bin.install "snow-cli-ro"
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/snow-cli --version")
  end
end
FORMULA

          # Use Python for cross-platform sed
          python3 -c "
import sys
path = '${FORMULA_PATH}'
version = '${version}'

with open(path) as f:
    content = f.read()

content = content.replace('VERSION_PLACEHOLDER', version)
content = content.replace('ARM_MAC_PLACEHOLDER', '${at_checksum}')
content = content.replace('INTEL_MAC_PLACEHOLDER', '${intel_mac_checksum}')
content = content.replace('LINUX_ARM_PLACEHOLDER', '${linux_arm_checksum}')
content = content.replace('LINUX_INTEL_PLACEHOLDER', '${linux_intel_checksum}')

with open(path, 'w') as f:
    f.write(content)

print(f'Updated formula to version {version}')
print(f'  aarch64-apple-darwin:  {at_checksum}')
print(f'  x86_64-apple-darwin:   {intel_mac_checksum}')
print(f'  aarch64-linux-gnu:     {linux_arm_checksum}')
print(f'  x86_64-linux-gnu:      {linux_intel_checksum}')
print(f'  x86_64-windows-msvc:   {win_checksum}')
"

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "snow-cli bot"
          git config user.email "bot@ewatch.github"

          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update snow-cli to ${{ steps.release.outputs.version }}"
          git push
